############
### MISC ###
############
cursor {
    default_monitor = DP-1
    no_hardware_cursors = 1
}

################
### MONITORS ###
################
monitorv2 {
  output = DP-1
  mode = 5120x1440@240.000
  position = 0x0
  scale = 1
  vrr = 1
  bitdepth = 10
  cm = edid
  sdr_min_luminance = 0.005
  sdr_max_luminance = 225
	min_luminance = 0
	max_luminance = 1000
}
quirks:prefer_hdr=1
render:cm_auto_hdr = 2
render:send_content_type=true

monitorv2 {
    output = HDMI-A-1
    mode = 2560x1440@143.91
    scale = 1
    position = -1440x-1120
    transform = 1
    vrr = 1
}

$priMon = DP-1
$secMon = HDMI-A-1

#############
### INPUT ###
#############
input {
  kb_layout = no
  accel_profile = flat

  follow_mouse = 2
  sensitivity = -0.4

}
device {
  name = sony-interactive-entertainment-dualsense-wireless-controller-touchpad
  enabled = false
}

###################
### MY PROGRAMS ###
###################
$terminal = uwsm app -- wezterm
$fileManager = uwsm app -- nautilus
$browser = uwsm app -- firefox
$discord = uwsm app -- vesktop

#################
### AUTOSTART ###
#################
exec-once = uwsm app -- qs -c noctalia-shell
exec-once = uwsm app -- wl-paste --watch cliphist store
exec-once = uwsm app -- steam
exec-once = uwsm app -- vesktop

#####################
### LOOK AND FEEL ###
#####################
general {
  gaps_in = 5
  gaps_out = 10

  border_size = 2
  
  layout = master
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

scrolling {
  focus_fit_method = 0
  follow_focus = true
  explicit_column_widths = 0.25, 0.5, 0.25
  direction = right
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
  slave_count_for_center_master = 0
  orientation = center
  mfact = 0.50
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

decoration {
  rounding = 20
  rounding_power = 2

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 3
    passes = 2
    vibrancy = 0.1696
  }
}

source = ./cfg/animation.conf
source = ./cfg/binds.conf
source = ./cfg/env.conf
source = ./cfg/rules.conf
source = ./cfg/game-rules.conf

source = /home/foxiecat/.config/hypr/noctalia/noctalia-colors.conf

