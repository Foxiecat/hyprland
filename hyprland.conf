############
### MISC ###
############
cursor {
    default_monitor = DP-1
    no_hardware_cursors = 1
}
quirks {
    prefer_hdr = 1
}

render {
    cm_auto_hdr = 2
}

################
### MONITORS ###
################
monitorv2 {
  output = DP-1
  mode = 5120x1440@240.000
  position = 0x0
  scale = 1
  vrr = 1
  bitdepth = 10
  cm = edid
}

monitorv2 {
    output = HDMI-A-1
    mode = 2560x1440@143.91
    scale = 1
    position = -1440x-1120
    transform = 1
}

$priMon = monitor:DP-1
$secMon = monitor:HDMI-A-1

#############
### INPUT ###
#############
input {
  kb_layout = no

  follow_mouse = 1
  sensitivity = -0.8
}


###################
### MY PROGRAMS ###
###################
$terminal = wezterm
$fileManager = dolphin
#$menu = hyprlauncher

#################
### AUTOSTART ###
#################
exec-once = qs -c noctalia-shell
exec-once = easyeffects --gapplication-service

# ## Slow app launch fix
exec-once = systemctl --user import-environment &
exec-once = hash dbus-update-activation-environment 2>/dev/null &
exec-once = dbus-update-activation-environment --systemd &

#####################
### LOOK AND FEEL ###
#####################
general {
  gaps_in = 5
  gaps_out = 10

  border_size = 2
  
  layout = master
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

scrolling {
  focus_fit_method = 0
  follow_focus = true
  explicit_column_widths = 0.25, 0.5, 0.25
  direction = right
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
  slave_count_for_center_master = 0
  orientation = center
  mfact = 0.50
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

decoration {
  rounding = 20
  rounding_power = 2

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 3
    passes = 2
    vibrancy = 0.1696
  }
}

source = ./cfg/animation.conf
source = ./cfg/binds.conf
source = ./cfg/env.conf
source = ./cfg/rules.conf

source = /home/foxiecat/.config/hypr/noctalia/noctalia-colors.conf

